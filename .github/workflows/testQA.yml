name: Run Tests

on:
  workflow_dispatch:
    inputs:
      testType:
        description: "Select test category"
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke-sanity
          - regression
          - api

  schedule:
    - cron: '30 3 * * *'   # Daily 9:00 AM IST

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testType: [smoke-sanity, regression, api]

    env:
      CI: true
      BROWSER: chrome

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - run: dotnet restore
      - run: dotnet build --no-restore

      # 🔥 Start Selenium Grid
      - name: Start Selenium Grid
        run: |
          docker run -d -p 4444:4444 --name selenium-hub selenium/hub:4.21.0
          docker run -d --link selenium-hub \
            -e SE_EVENT_BUS_HOST=selenium-hub \
            -e SE_EVENT_BUS_PUBLISH_PORT=4442 \
            -e SE_EVENT_BUS_SUBSCRIBE_PORT=4443 \
            -e SE_NODE_MAX_SESSIONS=3 \
            selenium/node-chrome:4.21.0

          echo "Waiting for Grid..."
          sleep 20

      - name: Check Grid Status
        run: curl http://localhost:4444/status

      # 🔥 Run Tests
      - name: Run Selected Tests
        run: |
          TYPE="${{ matrix.testType }}"

          echo "Running tests: $TYPE"

          if [ "$TYPE" = "smoke-sanity" ]; then
            dotnet test --filter "(Category=smoke|Category=sanity)&Category!=wip"

          elif [ "$TYPE" = "regression" ]; then
            dotnet test --no-build --filter "Category=regression&Category!=wip"

          elif [ "$TYPE" = "api" ]; then
            dotnet test --no-build --filter "Category=api&Category!=wip"

          else
            dotnet test --no-build --filter "Category!=wip"
          fi
        env:
          USE_GRID: true
          CI: true
          BROWSER: chrome

      # 🔥 Upload Allure Results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.testType }}
          path: Tests/bin/Debug/net8.0/allure-results

  merge-report:
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # 🔽 Download all artifacts
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      # 🔽 Merge results
      - name: Merge Results
        run: |
          mkdir merged-results
          cp -r allure-results/*/* merged-results || true

      # 🔥 NEW: Checkout previous report (history source)
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      # 🔥 NEW: Copy history into current run
      - name: Copy Allure History
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p merged-results/history
            cp -r gh-pages/history/* merged-results/history
          fi

      # 🔥 Add environment info
      - name: Add Allure Environment Info
        run: |
          mkdir -p merged-results
          echo "RunNumber=${{ github.run_number }}" >> merged-results/environment.properties
          echo "Repository=${{ github.repository }}" >> merged-results/environment.properties

      # 🔥 Generate report (with history)
      - name: Generate Allure Report
        run: |
          allure generate merged-results -o allure-report --clean

      # 🔥 Deploy
      - name: Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      # 🔗 Print URL
      - name: Print Report URL
        run: |
          echo "🔗 Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      # 🔔 Slack Notification
      - name: Send Slack Notification
        if: always()
        run: |
          STATUS="SUCCESS"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="FAILED"
          fi

          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          MESSAGE="🚀 *Test Run ${STATUS}*
          🔹 Repo: ${{ github.repository }}
          🔹 Run #: ${{ github.run_number }}
          🔗 Report: ${REPORT_URL}"

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$MESSAGE\"}" \
          ${{ secrets.SLACK_WEBHOOK }}
