name: Run Tests

on:
  workflow_dispatch:
    inputs:
      testType:
        description: "Select test category"
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke-sanity
          - regression
          - api

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      CI: true
      BROWSER: chrome

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - run: dotnet restore
      - run: dotnet build --no-restore

      - name: Run Selected Tests
        run: |
          if [ "${{ github.event.inputs.testType }}" = "smoke-sanity" ]; then
            dotnet test --no-build --filter "Category=smoke|Category=sanity"

          elif [ "${{ github.event.inputs.testType }}" = "regression" ]; then
            dotnet test --no-build --filter "Category=regression"

          elif [ "${{ github.event.inputs.testType }}" = "api" ]; then
            dotnet test --no-build --filter "Category=api"

          elif [ "${{ github.event.inputs.testType }}" = "all" ]; then
            dotnet test --no-build
          fi

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy Allure history
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p Tests/bin/Debug/net8.0/allure-results/history
            cp -r gh-pages/history/* Tests/bin/Debug/net8.0/allure-results/history
          fi

      - name: Add Allure Environment Info
        run: |
          mkdir -p Tests/bin/Debug/net8.0/allure-results
          echo "Browser=${{ env.BROWSER }}" >> Tests/bin/Debug/net8.0/allure-results/environment.properties
          echo "TestType=${{ github.event.inputs.testType }}" >> Tests/bin/Debug/net8.0/allure-results/environment.properties
          echo "RunNumber=${{ github.run_number }}" >> Tests/bin/Debug/net8.0/allure-results/environment.properties
          echo "Repository=${{ github.repository }}" >> Tests/bin/Debug/net8.0/allure-results/environment.properties

      - name: Generate Allure Report
        run: |
          allure generate Tests/bin/Debug/net8.0/allure-results \
          -o allure-report --clean

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
